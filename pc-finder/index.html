<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Finder AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🖥️ PC Finder AI</h1>
        <p>Vertel me waar je de PC voor gaat gebruiken (bijv. gamen, school, video-editen).</p>
        
        <textarea id="userInput" placeholder="Ik zoek een PC voor..."></textarea>
        <button id="searchBtn">Zoek mijn PC</button>

        <div id="result" class="result-box">
            <em>Het advies verschijnt hier...</em>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
