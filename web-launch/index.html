<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mattyou Web Launch - Mattyou Studios</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        .fullscreen-iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .studio-badge {
            position: fixed; 
            bottom: 12px; 
            right: 16px; /* 1mm naar rechts verplaatst */
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 20px), linear-gradient(135deg, #020111 0%, #191621 25%, #20202c 50%, #191621 75%, #020111 100%);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 10px rgba(100, 149, 237, 0.3);
            color: white;
            padding: 12px 24px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            font-weight: 800;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            z-index: 9999;
            pointer-events: auto;
            white-space: nowrap;
            user-select: none;
        }
    </style>
</head>
<body>
    <iframe class="fullscreen-iframe" src="https://mattyou-web-launch.base44.app" allowfullscreen></iframe>
    <div class="studio-badge">Made by Mattyou Studios™</div>
</body>
</html>
