<!DOCTYPE html>
<html>
<head>
    <title>MC Chat Bridge</title>
</head>
<body style="font-family: Arial; background: #222; color: white; padding: 20px;">

    <h2>Live Server Chat</h2>
    <div id="chatbox" style="background: #333; height: 300px; padding: 10px; overflow-y: auto; border: 1px solid #555;">
        Wachten op berichten...
    </div>

    <div style="margin-top: 10px;">
        <input type="text" id="berichtje" placeholder="Typ iets naar de server..." style="padding: 10px; width: 70%;">
        <button onclick="stuurNaarMC()" style="padding: 10px;">Verstuur</button>
    </div>

    <script>
        // GEBRUIK HIER DEZELFDE CODE ALS IN SKRIPT!
        const KANAAL = "jouw_unieke_code_hier";

        // Haal berichten op van de server
        async function haalChatOp() {
            try {
                const response = await fetch(`https://ntfy.sh/${KANAAL}/json?poll=1`);
                const data = await response.json();
                if (data.message) {
                    const box = document.getElementById('chatbox');
                    box.innerHTML += `<p>${data.message}</p>`;
                    box.scrollTop = box.scrollHeight; // Scroll naar beneden
                }
            } catch (e) { console.log("Nog geen berichten..."); }
        }

        // Stuur bericht van de website naar de server
        function stuurNaarMC() {
            const tekst = document.getElementById('berichtje').value;
            if (!tekst) return;
            
            fetch(`https://ntfy.sh/${KANAAL}`, {
                method: 'POST',
                body: "Web: " + tekst
            });
            
            document.getElementById('berichtje').value = "";
        }

        // Check elke 2 seconden op nieuwe berichten
        setInterval(haalChatOp, 2000);
    </script>
</body>
</html>
