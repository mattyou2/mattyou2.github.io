<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mattyou Studios - Dashboard</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        h1 { border-bottom: 2px solid #38bdf8; padding-bottom: 10px; }
        .app-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
        }
        .app-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #334155;
            transition: transform 0.2s;
            text-decoration: none;
            color: white;
        }
        .app-card:hover {
            transform: scale(1.05);
            border-color: #38bdf8;
        }
        .app-card h3 { margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Mattyou Studios Apps</h1>
    <p>Welkom op mijn officiële dashboard. Kies een app hieronder:</p>

    <div class="app-container">
        <a href="/wiki" class="app-card">
            <h3>Minecraft Wiki</h3>
            <p>De complete gids voor Minecraft Java Edition.</p>
        </a>

        <div class="app-card" style="opacity: 0.5;">
            <h3>Binnenkort...</h3>
            <p>Hier komt mijn volgende project.</p>
        </div>
    </div>

</body>
</html>
