<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mattyou Studios - Playable Games</title>
    <style>
        /* Donker thema basis - Exact hetzelfde als dashboard */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Titel styling - Exact hetzelfde als dashboard */
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-align: center;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Container voor de app-kaarten */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        /* De kaarten styling - Exact hetzelfde als dashboard */
        .app-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .app-card:hover {
            transform: translateY(-10px);
            border-color: #38bdf8;
            box-shadow: 0 15px 40px rgba(56, 189, 248, 0.2);
            background: #243046;
        }

        .app-card h3 {
            font-size: 1.8rem;
            margin: 0 0 10px 0;
        }

        .app-card p {
            color: #cbd5e1;
            font-size: 1rem;
            line-height: 1.5;
            margin: 0;
        }

        /* Specifieke styling voor de Terug-knop onderaan */
        .back-container {
            margin-top: 40px;
        }

        .back-link {
            text-decoration: none;
            color: #38bdf8;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* Footer Badge */
        .footer-badge {
            margin-top: 60px;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 800;
            font-size: 1rem;
            color: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* "Coming Soon" kaart is minder fel */
        .coming-soon {
            opacity: 0.6;
            cursor: default;
        }
        .coming-soon:hover {
            transform: none;
            border-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <h1>Playable Games</h1>
    <p class="subtitle">Speel direct in je browser</p>

    <div class="app-grid">
        
        <a href="https://mattyou2.github.io/game/rolling-balls/" class="app-card">
            <h3>Rolling Balls</h3>
            <p>Een uitdagende 3D game van Mattyou Studios.</p>
        </a>

        <div class="app-card coming-soon">
            <h3>More Games</h3>
            <p>Coming Soon...</p>
        </div>

    </div>

    <div class="back-container">
        <a href="https://mattyou2.github.io/" class="back-link">← Terug naar Dashboard</a>
    </div>

    <div class="footer-badge">
        Made by Mattyou Studios™
    </div>

</body>
</html>
