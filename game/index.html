<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mattyou Studios - Rolling Balls</title>
    <style>
        /* Basisstijl van je dashboard */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Voorkomt scrollen op de game pagina */
        }

        /* Navigatie balk bovenaan */
        .nav-header {
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            z-index: 100;
        }

        .back-btn {
            text-decoration: none;
            color: #38bdf8;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #ffffff;
            transform: translateX(-5px);
        }

        .game-title {
            font-weight: 800;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        /* Game Container (Full Screen minus de header) */
        #mattyou-container {
            position: relative;
            flex-grow: 1;
            width: 100vw;
            height: calc(100vh - 60px); /* Ruimte voor de header */
            background-color: #000;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #080808; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; 
            opacity: 1;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .loader {
            width: 35px; height: 35px; 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top-color: #38bdf8; 
            border-radius: 50%; 
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* De iframe van de game */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Footer balkje */
        .game-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: #050505;
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .game-footer span {
            color: #64748b;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">← Terug naar Dashboard</a>
        <h2 class="game-title">Rolling Balls</h2>
        <div style="width: 100px;"></div> </div>

    <div id="mattyou-container">
        
        <div id="splash-screen">
            <h1 style="color: #ffffff; font-size: 24px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 25px;">
                Mattyou Game Studios
            </h1>
            <div class="loader"></div>
        </div>

        <iframe src="https://itch.io/embed-upload/17037444?color=333333" allow="autoplay; fullscreen; vr" allowfullscreen=""></iframe>

        <div class="game-footer">
            <span>Mattyou 3D Studios</span>
        </div>
    </div>

    <script>
        // Splash screen script
        setTimeout(function() {
            var splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            
            setTimeout(function() { 
                splash.style.display = 'none'; 
            }, 500);
        }, 1200); // Iets langer voor een vloeiende overgang
    </script>

</body>
</html>
